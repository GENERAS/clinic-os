# ClinicOS Supabase Configuration
# Deploy edge functions: supabase functions deploy send-whatsapp
#                      supabase functions deploy whatsapp-webhook
#                      supabase functions deploy check-whatsapp-health
#                      supabase functions deploy process-reminders

[functions]
enabled = true

[functions.send-whatsapp]
verify_jwt = false
import_map = "./import_map.json"

[functions.whatsapp-webhook]
verify_jwt = false
import_map = "./import_map.json"

[functions.check-whatsapp-health]
verify_jwt = false
import_map = "./import_map.json"

[functions.process-reminders]
verify_jwt = false
import_map = "./import_map.json"
